<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Control Center — Task Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
  <script defer src="project-data.js"></script>
  <script defer src="task-app.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1>Mac Control Center</h1>
        <p id="heroSummary">Local project tracker</p>
      </div>
      <nav class="tabs" aria-label="Tracker navigation">
        <a class="tab active" href="index.html">Tasks</a>
        <a class="tab" href="docs.html">Docs</a>
      </nav>
    </div>
  </header>

  <div class="page-wrap">

    <!-- Single toolbar row -->
    <div class="toolbar">
      <input class="toolbar-search" id="searchInput" type="text" placeholder="Search tasks…">
      <select id="filterSelect" style="width:auto;min-width:100px;">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="hidden">Done</option>
        <option value="urgent">Urgent</option>
        <option value="recommended">Recommended</option>
        <option value="requested">Requested</option>
      </select>
      <div class="view-toggle" id="viewToggle" role="tablist" aria-label="Task view">
        <button class="view-button active" id="cardsViewButton" type="button">Tasks</button>
        <button class="view-button" id="boardViewButton" type="button">Board</button>
      </div>
      <button class="primary" id="openCreateButton" type="button">+ Add</button>
      <button class="ghost" id="toggleInfoButton" type="button" aria-expanded="false" style="padding:7px 10px;" title="Info &amp; stats">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
    </div>

    <!-- Info panel (hidden by default) -->
    <div class="info-panel" id="infoDrawer" hidden>
      <div class="stats-grid" id="statsGrid"></div>
      <p style="font-size:0.78rem;color:var(--muted-soft);margin:0 0 10px;" id="storageStatus"></p>
      <div class="button-row">
        <button class="secondary" id="exportJsonButton" type="button">Export JSON</button>
        <button class="secondary" id="exportMarkdownButton" type="button">Export Markdown</button>
        <button class="ghost" id="resetButton" type="button">Reset to Seed</button>
      </div>
      <div class="notice" id="seedNotice" hidden></div>
    </div>

    <!-- Meta row -->
    <div class="meta-row">
      <span class="meta-pill" id="reviewedOnPill"></span>
      <span class="meta-pill" id="maintainedByPill"></span>
      <span class="meta-pill" id="seedVersionPill"></span>
      <span style="margin-left:auto;font-size:0.68rem;color:var(--muted-soft);" id="filterSummary"></span>
    </div>

    <!-- Main panel -->
    <div class="main-panel">
      <div class="panel-header">
        <h2 class="panel-title" id="workspaceTitle">Tasks / Actions</h2>
      </div>

      <!-- List (card) view -->
      <div id="cardsView"></div>

      <!-- Board view -->
      <div id="boardView" hidden>
        <div class="board-columns" id="boardColumns"></div>
      </div>

      <!-- Completed & Archived — card view only -->
      <div class="completed-wrap" id="hiddenListsWrap" hidden>
        <button class="completed-toggle" id="hiddenListsToggle" type="button" aria-expanded="false">
          <span>Completed &amp; Archived</span>
          <span class="completed-count" id="hiddenListsCount">0</span>
          <span class="completed-chevron">⌄</span>
        </button>
        <div class="hidden-lists" id="hiddenLists" hidden>
          <div class="hidden-group">
            <div class="hidden-group-header">
              <h3>Completed</h3>
              <span style="font-size:0.72rem;color:var(--muted-soft);" id="completedCount">0</span>
            </div>
            <div class="hidden-list" id="completedList"></div>
          </div>
          <div class="hidden-group">
            <div class="hidden-group-header">
              <h3>Archived</h3>
              <span style="font-size:0.72rem;color:var(--muted-soft);" id="archivedCount">0</span>
            </div>
            <div class="hidden-list" id="archivedList"></div>
          </div>
        </div>
      </div>

    </div><!-- /.main-panel -->

  </div><!-- /.page-wrap -->

  <!-- Task modal -->
  <div class="modal-backdrop" id="taskModal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <p class="modal-eyebrow">Task Editor</p>
          <h2 class="modal-title" id="modalTitle">Add Task</h2>
        </div>
        <button class="ghost" type="button" id="closeModalButton">Close</button>
      </div>
      <form id="taskForm">
        <div class="form-grid">
          <div class="field full">
            <label for="taskTitle">Title</label>
            <input id="taskTitle" name="taskTitle" required placeholder="What needs to be done?">
          </div>
          <div class="field">
            <label for="taskLane">List</label>
            <select id="taskLane" name="taskLane"></select>
          </div>
          <div class="field">
            <label for="taskUrgency">Urgency</label>
            <select id="taskUrgency" name="taskUrgency">
              <option value="1">1 — Low</option>
              <option value="2">2</option>
              <option value="3" selected>3 — Medium</option>
              <option value="4">4</option>
              <option value="5">5 — Critical</option>
            </select>
          </div>
          <div class="field">
            <label for="taskValue">Dollar Value</label>
            <input id="taskValue" name="taskValue" type="number" min="0" step="100" placeholder="e.g. 5000">
          </div>
          <div class="field">
            <label for="taskArea">Area</label>
            <select id="taskArea" name="taskArea"></select>
          </div>
          <div class="field">
            <label for="taskSource">Source</label>
            <select id="taskSource" name="taskSource">
              <option value="user-requested" selected>Requested</option>
              <option value="recommended">Recommended</option>
              <option value="local-note">Local note</option>
            </select>
          </div>
          <div class="field full">
            <label for="taskNotes">Notes</label>
            <textarea id="taskNotes" name="taskNotes" placeholder="Keep it short and action-oriented."></textarea>
          </div>
        </div>
        <div class="button-row" style="margin-top:14px;">
          <button class="primary" type="submit" id="submitButton">Save Task</button>
          <button class="ghost" type="button" id="cancelEditButton">Cancel</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
