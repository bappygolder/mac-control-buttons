<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Control Center Task Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="project-data.js"></script>
  <script defer src="task-app.js"></script>
</head>
<body>
  <div class="shell">
    <header class="shell-header">
      <div class="brand">
        <p class="eyebrow">Local Project System</p>
        <h1>Mac Control Center Tracker</h1>
        <p>Minimal local backlog, repo-backed seed data, and lightweight browser persistence.</p>
      </div>
      <nav class="tabs" aria-label="Tracker navigation">
        <a class="tab active" href="index.html">Tasks</a>
        <a class="tab" href="docs.html">Docs</a>
      </nav>
    </header>

    <section class="hero hero-compact">
      <div class="hero-copy">
        <div class="pill-row">
          <span class="kicker" id="reviewedOnPill">Review date</span>
          <span class="kicker" id="maintainedByPill">Maintained by</span>
          <span class="kicker" id="seedVersionPill">Seed version</span>
        </div>
        <h2>Focused backlog</h2>
        <p id="heroSummary"></p>
      </div>

      <aside class="toolbar-card">
        <div class="toolbar-row">
          <input class="toolbar-grow" id="searchInput" placeholder="Search tasks">
          <select id="filterSelect">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="hidden">Hidden</option>
            <option value="urgent">Urgent</option>
            <option value="recommended">Recommended</option>
            <option value="requested">Requested</option>
          </select>
          <div class="view-toggle" id="viewToggle" role="tablist" aria-label="Task view">
            <button class="view-button active" id="cardsViewButton" type="button" data-view="cards">Cards</button>
            <button class="view-button" id="boardViewButton" type="button" data-view="board">Board</button>
          </div>
          <button class="primary" id="openCreateButton" type="button">+ Add Task</button>
          <button class="ghost" id="toggleInfoButton" type="button" aria-expanded="false">Info</button>
        </div>

        <div class="info-drawer" id="infoDrawer" hidden>
          <div class="stats-grid" id="statsGrid"></div>
          <p id="storageStatus"></p>
          <div class="button-row" style="margin-top: 12px;">
            <button class="secondary" id="exportJsonButton" type="button">Export JSON</button>
            <button class="secondary" id="exportMarkdownButton" type="button">Export Markdown</button>
            <button class="ghost" id="resetButton" type="button">Reset to Repo Seed</button>
          </div>
          <div class="notice" id="seedNotice" hidden></div>
        </div>
      </aside>
    </section>

    <section class="panel panel-tight">
      <div class="section-heading">
        <div>
          <h2 id="workspaceTitle">Cards</h2>
          <p class="subtle" id="filterSummary"></p>
        </div>
      </div>
      <div class="cards-view active" id="cardsView"></div>
      <div class="board-view" id="boardView" hidden>
        <div class="board-columns" id="boardColumns"></div>
      </div>
      <div class="completed-wrap" id="hiddenListsWrap" hidden>
        <button class="completed-toggle" id="hiddenListsToggle" type="button" aria-expanded="false">
          <span>Completed &amp; Archived</span>
          <span class="completed-count" id="hiddenListsCount">0</span>
          <span class="completed-chevron">⌄</span>
        </button>
        <div class="hidden-lists" id="hiddenLists" hidden>
          <div class="hidden-group">
            <div class="hidden-group-header">
              <h3>Completed</h3>
              <span class="subtle" id="completedCount">0</span>
            </div>
            <div class="task-grid hidden-grid" id="completedList"></div>
          </div>
          <div class="hidden-group">
            <div class="hidden-group-header">
              <h3>Archived</h3>
              <span class="subtle" id="archivedCount">0</span>
            </div>
            <div class="task-grid hidden-grid" id="archivedList"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="taskModal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Task Editor</p>
          <h2 id="modalTitle">Add Task</h2>
        </div>
        <button class="ghost" type="button" id="closeModalButton">Close</button>
      </div>

      <form id="taskForm">
        <div class="form-grid">
          <div class="field full">
            <label for="taskTitle">Title</label>
            <input id="taskTitle" name="taskTitle" required>
          </div>
          <div class="field">
            <label for="taskLane">List</label>
            <select id="taskLane" name="taskLane"></select>
          </div>
          <div class="field">
            <label for="taskUrgency">Urgency</label>
            <select id="taskUrgency" name="taskUrgency">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <div class="field">
            <label for="taskValue">Dollar Value</label>
            <input id="taskValue" name="taskValue" type="number" min="0" step="100" placeholder="10000">
          </div>
          <div class="field">
            <label for="taskArea">Area</label>
            <select id="taskArea" name="taskArea"></select>
          </div>
          <div class="field">
            <label for="taskSource">Source</label>
            <select id="taskSource" name="taskSource">
              <option value="user-requested" selected>user-requested</option>
              <option value="recommended">recommended</option>
              <option value="local-note">local-note</option>
            </select>
          </div>
          <div class="field full">
            <label for="taskNotes">Notes</label>
            <textarea id="taskNotes" name="taskNotes" placeholder="Keep this short and action-oriented."></textarea>
          </div>
        </div>
        <div class="button-row" style="margin-top: 16px;">
          <button class="primary" type="submit" id="submitButton">Save Task</button>
          <button class="ghost" type="button" id="cancelEditButton">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
