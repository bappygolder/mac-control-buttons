<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Control Center — Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
  <script defer src="project-data.js"></script>
  <script defer src="docs-content.js"></script>
  <script defer src="docs-app.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1>Mac Control Center</h1>
        <p>Project docs &amp; skills reference</p>
      </div>
      <nav class="tabs" aria-label="Tracker navigation">
        <a class="tab" href="index.html">Tasks</a>
        <a class="tab active" href="docs.html">Docs</a>
      </nav>
    </div>
  </header>

  <!-- Full-height docs layout -->
  <div class="docs-page">

    <!-- Sidebar -->
    <aside class="docs-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Documentation</div>
        <div class="sidebar-items" id="docsNav"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Skills</div>
        <div class="sidebar-items" id="skillsNav"></div>
      </div>
    </aside>

    <!-- Doc viewer -->
    <main class="docs-viewer">
      <div class="viewer-header">
        <div>
          <p class="viewer-eyebrow" id="viewerType">Document</p>
          <h2 class="viewer-title" id="viewerTitle">Loading…</h2>
          <p class="viewer-summary" id="viewerSummary"></p>
        </div>
        <a class="ghost" id="openRawLink" href="../docs/README.md" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);text-decoration:none;font-size:0.8rem;color:var(--muted);transition:color 0.15s,background 0.15s;" onmouseover="this.style.color='var(--text)';this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--muted)';this.style.background='transparent'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open raw
        </a>
      </div>
      <div class="markdown-view" id="docPreview"></div>
    </main>

  </div><!-- /.docs-page -->

  <!-- Hidden pill IDs required by docs-app.js hydration -->
  <span id="docsReviewedOn" hidden></span>
  <span id="docsMaintainedBy" hidden></span>

</body>
</html>
